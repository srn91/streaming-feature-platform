services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.8
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092,OUTSIDE://localhost:19092
    ports:
      - "19092:19092"
      - "19644:9644"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: feature_platform
      POSTGRES_USER: platform_user
      POSTGRES_PASSWORD: platform_pass

  api:
    image: python:3.11-slim
    working_dir: /app
    environment:
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
    volumes:
      - ./:/app
    command: sh -c "pip install -r requirements.txt && uvicorn src.serving.api:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8010:8000"
    depends_on:
      - redis
      - redpanda
