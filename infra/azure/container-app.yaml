location: eastus
name: streaming-feature-platform
type: Microsoft.App/containerApps
properties:
  managedEnvironmentId: /subscriptions/<subscription-id>/resourceGroups/<resource-group>/providers/Microsoft.App/managedEnvironments/<environment-name>
  configuration:
    ingress:
      external: true
      targetPort: 8010
      transport: auto
    registries:
      - server: ghcr.io
    activeRevisionsMode: Single
  template:
    containers:
      - name: api
        image: ghcr.io/srn91/streaming-feature-platform:latest
        env:
          - name: HOSTED_DEMO
            value: "1"
          - name: DEMO_SEED_USERS
            value: "12"
          - name: DEMO_EVENTS_PER_USER
            value: "16"
          - name: DEMO_SAMPLE_EVENTS_PATH
            value: data/generated/sample_events.jsonl
        probes:
          - type: Liveness
            httpGet:
              path: /health
              port: 8010
            initialDelaySeconds: 10
            periodSeconds: 20
          - type: Readiness
            httpGet:
              path: /health
              port: 8010
            initialDelaySeconds: 5
            periodSeconds: 10
        resources:
          cpu: 0.5
          memory: 1Gi
    scale:
      minReplicas: 1
      maxReplicas: 2
