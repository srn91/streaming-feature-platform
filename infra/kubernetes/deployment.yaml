apiVersion: apps/v1
kind: Deployment
metadata:
  name: streaming-feature-platform
  labels:
    app: streaming-feature-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: streaming-feature-platform
  template:
    metadata:
      labels:
        app: streaming-feature-platform
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8010"
    spec:
      containers:
        - name: api
          image: ghcr.io/srn91/streaming-feature-platform:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: streaming-feature-platform-config
          ports:
            - containerPort: 8010
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
